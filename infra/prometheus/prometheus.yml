global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'streamlineage-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lineage-ingester'
    static_configs:
      - targets: ['lineage-ingester:9091']

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']
